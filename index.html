<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTS Pemrograman Web II - PMB UNPAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9fc; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-white border-r border-[#c3c6d1] hidden lg:flex flex-col fixed h-full shadow-md z-40">
        <div class="p-6 flex items-center gap-3">
            <div class="bg-[#003366] w-10 h-10 rounded flex items-center justify-center text-white font-bold">U</div>
            <div>
                <h1 class="font-bold text-[#001e40] text-sm">Portal PMB</h1>
                <p class="text-[9px] text-gray-500 uppercase">Universitas Pamulang</p>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <div class="flex items-center gap-3 px-4 py-3 bg-[#fed65b] text-[#745c00] rounded-lg shadow-sm">
                <span class="material-symbols-outlined">assignment_ind</span> <span class="text-sm font-semibold">Pendaftaran</span>
            </div>
        </nav>
        <div class="p-6 border-t border-[#c3c6d1]">
            <button onclick="resetData()" class="flex items-center gap-3 px-4 py-2 text-red-600 hover:bg-red-50 w-full rounded-lg text-sm font-bold">
                <span class="material-symbols-outlined">delete</span> Hapus Semua Data
            </button>
        </div>
    </aside>

    <main class="flex-1 lg:ml-64 p-8">
        <div class="max-w-5xl mx-auto">
            <header class="mb-10">
                <h2 class="text-2xl font-bold text-[#001e40]">Formulir Pendaftaran Mahasiswa Baru</h2>
                <p class="text-gray-500 text-sm">Gunakan Kode A (Gedung A), B (Gedung B), atau V (Viktor)[cite: 36, 37].</p>
            </header>

            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-white border border-[#c3c6d1] rounded-xl p-6 shadow-sm h-fit">
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Nama Pendaftar</label>
                            <input type="text" id="nama" class="w-full border border-[#c3c6d1] p-2 rounded-lg text-sm outline-[#003366]">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Kode Pendaftaran</label>
                            <input type="text" id="kode" placeholder="Contoh: A2-101-9" class="w-full border border-[#c3c6d1] p-2 rounded-lg text-sm outline-[#003366]">
                        </div>
                        <div class="grid grid-cols-3 gap-2 pt-2">
                            <input type="number" id="mat" placeholder="MAT" class="border border-[#c3c6d1] p-2 rounded-lg text-center text-sm">
                            <input type="number" id="ing" placeholder="ING" class="border border-[#c3c6d1] p-2 rounded-lg text-center text-sm">
                            <input type="number" id="umum" placeholder="UMUM" class="border border-[#c3c6d1] p-2 rounded-lg text-center text-sm">
                        </div>
                        <button onclick="simpanData()" class="w-full bg-[#001e40] text-white font-bold py-3 rounded-lg mt-4 hover:bg-[#003366] transition-all shadow-md">
                            SIMPAN DATA
                        </button>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="bg-white border border-[#c3c6d1] rounded-xl shadow-sm overflow-hidden">
                        <table class="w-full text-left text-sm" id="tabelPendaftar">
                            <thead class="bg-[#f3f3f6] border-b text-[#001e40] font-bold">
                                <tr>
                                    <th class="p-4">KODE</th>
                                    <th class="p-4">NAMA</th>
                                    <th class="p-4">LOKASI TES</th>
                                    <th class="p-4 text-center">RATA-RATA</th>
                                    <th class="p-4 text-center">STATUS</th>
                                </tr>
                            </thead>
                            <tbody class="text-gray-700">
                                </tbody>
                        </table>
                        
                        <div class="p-4 bg-[#f3f3f6] flex justify-between text-[11px] font-bold text-gray-500 uppercase border-t">
                            <span id="statTotal">Total: 0</span>
                            <span id="statLulus" class="text-green-600">Lulus: 0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Ambil data pas halaman dibuka
        window.onload = function() { tampilkanData(); };

        function simpanData() {
            const nama = document.getElementById('nama').value;
            const kode = document.getElementById('kode').value;
            const mat = parseFloat(document.getElementById('mat').value) || 0;
            const ing = parseFloat(document.getElementById('ing').value) || 0;
            const umum = parseFloat(document.getElementById('umum').value) || 0;

            if(!nama || !kode) return alert("Isi data dulu bro!");

            // LOGIKA 1: Lokasi Tes [cite: 36, 37]
            let lokasi = "Gedung A";
            const charAwal = kode.charAt(0).toUpperCase();
            if(charAwal === 'B') lokasi = "Gedung B";
            if(charAwal === 'V') lokasi = "Viktor";

            // LOGIKA 2: Rata-rata [cite: 45]
            const rata = (mat + ing + umum) / 3;

            // LOGIKA 3: Keterangan [cite: 46]
            let status = "Tidak Lulus";
            if(rata >= 70) status = "Lulus";
            else if(rata >= 60) status = "Cadangan";

            const pendaftar = {
                id: Date.now(),
                nama, kode, lokasi, 
                rata: rata.toFixed(1),
                status
            };

            // Simpan ke LocalStorage [cite: 17]
            let data = JSON.parse(localStorage.getItem('unpam_pmb')) || [];
            data.push(pendaftar);
            localStorage.setItem('unpam_pmb', JSON.stringify(data));

            tampilkanData();
            // Clear Input
            document.getElementById('nama').value = '';
            document.getElementById('kode').value = '';
        }

        function tampilkanData() {
            const data = JSON.parse(localStorage.getItem('unpam_pmb')) || [];
            const tbody = document.querySelector('#tabelPendaftar tbody');
            tbody.innerHTML = '';

            data.reverse().forEach(p => {
                let colorClass = "bg-red-100 text-red-700 border-red-200";
                if(p.status === "Lulus") colorClass = "bg-green-100 text-green-700 border-green-200";
                if(p.status === "Cadangan") colorClass = "bg-yellow-100 text-yellow-700 border-yellow-200";

                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4 font-mono">${p.kode}</td>
                        <td class="p-4 font-bold">${p.nama}</td>
                        <td class="p-4 text-xs">${p.lokasi}</td>
                        <td class="p-4 text-center font-bold">${p.rata}</td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold border ${colorClass}">${p.status}</span>
                        </td>
                    </tr>
                `;
            });

            // Update Summary
            document.getElementById('statTotal').innerText = `Total: ${data.length}`;
            document.getElementById('statLulus').innerText = `Lulus: ${data.filter(x => x.status === "Lulus").length}`;
        }

        function resetData() {
            localStorage.removeItem('unpam_pmb');
            tampilkanData();
        }
    </script>
</body>
</html>
